<div class="chat-container" style="display: flex; height: 80vh; border: 1px solid #ccc; background: #fff;">
    
    <div class="chat-sidebar" style="width: 30%; border-right: 1px solid #ccc; display: flex; flex-direction: column;">
        <div class="chat-search-box" style="padding: 10px; border-bottom: 1px solid #eee;">
            <input type="text" id="chat-search-input" placeholder="Rechercher un ami..." style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
        </div>
        <div id="chat-users-list" style="flex: 1; overflow-y: auto;">
            </div>
    </div>

    <div class="chat-main" style="width: 70%; display: flex; flex-direction: column;">
        <div id="chat-active-user-header" style="padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; background: #f9f9f9;">
            Sélectionnez une discussion pour commencer à discuter
        </div>

        <div id="chat-messages-box" style="flex: 1; padding: 20px; overflow-y: auto; background: #f4f6f9; display: flex; flex-direction: column; gap: 10px;">
            </div>

        <form id="chat-form" style="padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center;" enctype="multipart/form-data">
            <input type="hidden" id="chat-receiver-id" value="">
            
            <input type="text" id="chat-message-input" placeholder="Écrivez votre message..." style="flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #ddd;">
            
            <label for="chat-image-input" style="cursor: pointer; padding: 8px; background: #e4e6eb; border-radius: 4px;">📷</label>
            <input type="file" id="chat-image-input" accept="image/*" style="display: none;">
            
            <button type="submit" style="padding: 10px 20px; background: #1877f2; color: white; border: none; border-radius: 4px; cursor: pointer;">Envoyer</button>
        </form>
    </div>
</div>
